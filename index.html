

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>易經六十四卦 — 學術查詢版</title>
<meta name="description" content="易經六十四卦完整學術查詢。卦辭、彖傳、象傳、爻辭、歷代注疏（王弼、程頤、朱熹）、說文解字，完整學術資料庫。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Serif+TC:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=dkOO2-IENU0kpquTqIVkcYfAn5o1fy72asMvhOFVdS8rU-cQhsxqLdcbkWs2qH9QqsHO4alaKfEJuOESEiwa2dXjYf2t3u4G4rDObnHz5ho" charset="UTF-8"></script><style>
:root{
  --bg:#F8F5F0;
  --bg2:#EFEBE3;
  --surface:#FFFFFF;
  --surface2:rgba(255,255,255,0.7);
  --border:rgba(0,0,0,0.07);
  --border-md:rgba(0,0,0,0.13);
  --border-strong:rgba(0,0,0,0.22);
  --text:#1A1612;
  --text2:#5A544E;
  --text3:#9A9188;
  --accent:#7A5C2E;
  --accent2:#4A6741;
  --red:#8B2020;
  --radius:14px;
  --radius-sm:7px;
  --serif:'Noto Serif TC',serif;
  --display:'DM Serif Display',serif;
  --sans:'DM Sans','Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ── Topbar ── */
.topbar{
  background:rgba(248,245,240,0.95);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border-md);
  height:54px;padding:0 2rem;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.brand{display:flex;align-items:baseline;gap:10px}
.brand-title{font-family:var(--display);font-size:18px;color:var(--text);font-weight:400}
.brand-sub{font-size:10px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase}
.topbar-right{font-size:11px;color:var(--text3);letter-spacing:.04em}

/* ── Layout ── */
.shell{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 54px)}

/* ── Sidebar ── */
.sidebar{
  border-right:1px solid var(--border-md);
  background:var(--surface);
  height:calc(100vh - 54px);
  position:sticky;top:54px;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-search{padding:1rem 1.1rem;border-bottom:1px solid var(--border)}
.search-inner{
  display:flex;align-items:center;gap:8px;
  border:1px solid var(--border-md);border-radius:30px;
  padding:7px 14px;background:var(--bg);
  transition:border-color .15s;
}
.search-inner:focus-within{border-color:var(--accent)}
.search-inner input{
  flex:1;border:none;outline:none;font-size:13px;
  font-family:var(--sans);color:var(--text);background:transparent;
}
.search-inner input::placeholder{color:var(--text3)}

.filter-wrap{padding:.75rem 1.1rem;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px}
.f-btn{
  font-size:10px;padding:3px 9px;border-radius:12px;
  border:1px solid var(--border-md);background:transparent;
  color:var(--text2);cursor:pointer;font-family:var(--sans);
  transition:all .12s;white-space:nowrap;
}
.f-btn:hover{background:var(--bg)}
.f-btn.active{background:var(--text);color:#fff;border-color:var(--text)}

.hex-list{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--border-md) transparent}
.hex-list::-webkit-scrollbar{width:4px}
.hex-list::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:2px}

.hex-item{
  display:grid;grid-template-columns:44px 1fr;
  gap:0 10px;padding:9px 14px;cursor:pointer;
  border-bottom:1px solid var(--border);
  transition:background .1s;align-items:center;
}
.hex-item:hover{background:var(--bg)}
.hex-item.active{background:rgba(122,92,46,0.07);border-left:2px solid var(--accent)}
.hex-symbol{font-size:22px;line-height:1;text-align:center}
.hex-info{}
.hex-num-small{font-size:9px;color:var(--text3);letter-spacing:.06em;font-family:var(--sans)}
.hex-name-small{font-family:var(--serif);font-size:14px;color:var(--text);font-weight:500}
.hex-en-small{font-size:9px;color:var(--text3);margin-top:1px;font-family:var(--sans)}
.hex-nature-small{display:inline-block;font-size:8px;padding:1px 6px;border-radius:8px;margin-top:3px;font-family:var(--sans)}

/* ── Main content ── */
.main{
  padding:0;
  min-width:0;
}
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:70vh;text-align:center;gap:12px;
}
.empty-icon{font-size:48px;opacity:.15}
.empty-title{font-family:var(--display);font-size:22px;color:var(--text2)}
.empty-sub{font-size:13px;color:var(--text3);line-height:1.7;max-width:300px}

/* ── Detail panel ── */
.detail{display:none;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.detail.show{display:block}

.detail-hero{
  padding:2.5rem 3rem 2rem;
  border-bottom:1px solid var(--border-md);
  background:var(--surface);
}
.detail-top{display:flex;align-items:flex-start;gap:1.75rem;margin-bottom:1.5rem}
.d-symbol{font-size:72px;line-height:1;flex-shrink:0;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.08))}
.d-title-area{}
.d-num{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;font-family:var(--sans)}
.d-name{font-family:var(--display);font-size:38px;font-weight:400;color:var(--text);margin-bottom:4px;line-height:1.1}
.d-name-en{font-family:var(--display);font-size:16px;font-style:italic;color:var(--accent);margin-bottom:10px}
.d-badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:10px;padding:3px 10px;border-radius:12px;font-family:var(--sans);font-weight:500}
.badge-nature{background:rgba(122,92,46,0.1);color:var(--accent);border:1px solid rgba(122,92,46,0.2)}
.badge-gua{background:var(--bg2);color:var(--text2);border:1px solid var(--border-md)}

.d-keywords{display:flex;gap:5px;flex-wrap:wrap}
.kw{font-size:11px;color:var(--text3);background:var(--bg);border:1px solid var(--border);padding:2px 8px;border-radius:12px;font-family:var(--sans)}

/* ── Tab nav ── */
.tab-nav{
  display:flex;gap:0;
  border-bottom:1px solid var(--border-md);
  background:var(--surface);
  padding:0 3rem;
  overflow-x:auto;scrollbar-width:none;
}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{
  font-size:12px;font-family:var(--sans);font-weight:500;
  padding:12px 16px;border:none;background:transparent;
  color:var(--text3);cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all .15s;
  letter-spacing:.04em;
}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Content sections ── */
.tab-content{display:none;padding:2rem 3rem 4rem}
.tab-content.show{display:block}

/* Typography for content */
.section-block{margin-bottom:2.5rem}
.sec-label{
  font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--text3);font-family:var(--sans);font-weight:600;
  margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.classic-text{
  font-family:var(--serif);font-size:17px;
  color:var(--text);line-height:2.1;
  font-weight:400;letter-spacing:.04em;
}
.translation{
  font-size:14px;color:var(--text2);line-height:1.9;
  margin-top:10px;font-family:var(--sans);
  padding:12px 16px;
  background:var(--bg);border-radius:var(--radius-sm);
  border-left:3px solid var(--border-md);
}

/* Commentary */
.commentary-block{
  margin-top:1.25rem;
  padding:14px 16px;
  border-radius:var(--radius-sm);
  background:var(--surface2);
  border:1px solid var(--border);
}
.comm-header{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.comm-scholar{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.05em;font-family:var(--sans)}
.comm-era{font-size:10px;color:var(--text3);font-family:var(--sans)}
.comm-text{font-family:var(--serif);font-size:13px;color:var(--text2);line-height:2}
.comm-trans{font-size:12px;color:var(--text3);line-height:1.7;margin-top:6px;font-family:var(--sans);font-style:italic}

/* Yao section */
.yao-grid{display:flex;flex-direction:column;gap:0}
.yao-block{padding:1.5rem 0;border-bottom:1px solid var(--border)}
.yao-block:last-child{border-bottom:none}
.yao-header{display:grid;grid-template-columns:80px 1fr;gap:0 16px;margin-bottom:10px}
.yao-idx{
  font-family:var(--display);font-size:24px;color:var(--accent);
  opacity:.25;font-style:italic;line-height:1;user-select:none;
}
.yao-meta{}
.yao-pos{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.06em;font-family:var(--sans);margin-bottom:4px}
.yao-nature-badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:8px;font-family:var(--sans);margin-bottom:6px}

.yao-body{padding-left:96px}
.yao-ci{font-family:var(--serif);font-size:16px;color:var(--text);line-height:2;letter-spacing:.04em;margin-bottom:8px}
.yao-meaning{font-size:13px;color:var(--text2);line-height:1.8;font-family:var(--sans);margin-bottom:10px}
.yao-commentaries{display:flex;flex-direction:column;gap:8px}

/* Shuowen */
.sz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.sz-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px 18px;
}
.sz-char-row{display:flex;align-items:baseline;gap:10px;margin-bottom:8px}
.sz-char{font-family:var(--serif);font-size:32px;color:var(--text);font-weight:500}
.sz-pinyin{font-size:13px;color:var(--text3);font-family:var(--sans);letter-spacing:.04em}
.sz-radical{font-size:10px;color:var(--accent);background:rgba(122,92,46,0.08);padding:2px 7px;border-radius:8px;font-family:var(--sans)}
.sz-original{
  font-family:var(--serif);font-size:13px;color:var(--text);
  line-height:2;margin-bottom:8px;padding:10px 12px;
  background:var(--bg);border-radius:var(--radius-sm);
  border-left:2px solid var(--accent);
}
.sz-trans{font-size:12px;color:var(--text2);line-height:1.7;font-family:var(--sans);margin-bottom:8px}
.sz-evolution{font-size:11px;color:var(--text3);font-family:var(--sans);line-height:1.6;border-top:1px solid var(--border);padding-top:8px;margin-top:4px}

/* Source grid */
.source-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.source-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;
}
.source-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px;font-family:var(--sans)}
.source-desc{font-size:11px;color:var(--text3);line-height:1.6;font-family:var(--sans)}

/* Responsive */
/* 1. 先定義按鈕外觀，並預設在電腦版隱藏 */
.mob-menu-btn{
  display:none;
  align-items:center;gap:6px;
  font-size:12px;color:var(--text2);
  background:var(--bg);border:1px solid var(--border-md);
  border-radius:20px;padding:5px 12px;cursor:pointer;
  font-family:var(--sans);
}

/* 2. 手機版響應式設定（必須放在最底下，才能成功覆蓋上面的隱藏設定） */
@media(max-width:900px){
  .shell{grid-template-columns:1fr}
  .sidebar{display:none}
  .sidebar.mobile-show{display:flex;position:fixed;inset:0;top:54px;z-index:50;width:100%;height:calc(100vh - 54px)}
  .detail-hero{padding:1.5rem 1.25rem 1.25rem}
  .tab-nav{padding:0 1.25rem}
  .tab-content{padding:1.5rem 1.25rem 3rem}
  .d-symbol{font-size:52px}
  .d-name{font-size:28px}
  .sz-grid{grid-template-columns:1fr}
  .yao-header{grid-template-columns:56px 1fr}
  .yao-body{padding-left:72px}
  .mob-menu-btn{display:flex} /* 螢幕小於 900px 時，按鈕才會現身！ */
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="brand-title">易經六十四卦</span>
    <span class="brand-sub">學術查詢版</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="mob-menu-btn" id="mob-btn" onclick="toggleSidebar()">☰ 卦象列表</button>
    <span class="topbar-right" id="topbar-date"></span>
  </div>
</div>

<div class="shell">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-search">
      <div class="search-inner">
        <span style="color:var(--text3);font-size:13px">◎</span>
        <input type="text" id="search-input" placeholder="搜尋卦名、關鍵字……" oninput="filterList(this.value)">
      </div>
    </div>
    <div class="filter-wrap" id="filter-wrap"></div>
    <div class="hex-list" id="hex-list"></div>
  </aside>

  <!-- Main -->
  <main class="main" id="main-panel">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">䷀</div>
      <div class="empty-title">選擇一卦開始查詢</div>
      <div class="empty-sub">從左側列表點選任一卦，查看完整學術資料，包含歷代注疏與說文解字。</div>
    </div>

    <div class="detail" id="detail-panel">
      <div class="detail-hero">
        <div class="detail-top">
          <div class="d-symbol" id="d-symbol"></div>
          <div class="d-title-area">
            <div class="d-num" id="d-num"></div>
            <div class="d-name" id="d-name"></div>
            <div class="d-name-en" id="d-name-en"></div>
            <div class="d-badges" id="d-badges"></div>
          </div>
        </div>
        <div class="d-keywords" id="d-keywords"></div>
      </div>

      <nav class="tab-nav" id="tab-nav">
        <button class="tab-btn active" onclick="showTab('gua')">卦辭與傳</button>
        <button class="tab-btn" onclick="showTab('yao')">六爻爻辭</button>
        <button class="tab-btn" onclick="showTab('sz')">說文解字</button>
        <button class="tab-btn" onclick="showTab('notes')">歷代注疏</button>
        <button class="tab-btn" onclick="showTab('sources')">參考文獻</button>
      </nav>

      <!-- Tab: 卦辭與傳 -->
      <div class="tab-content show" id="tab-gua">
        <div class="section-block">
          <div class="sec-label">卦辭 Guaci</div>
          <div class="classic-text" id="t-gua"></div>
          <div class="translation" id="t-gua-trans"></div>
          <div id="t-gua-comm"></div>
        </div>
        <div class="section-block">
          <div class="sec-label">彖傳 Tuanzhuan · 孔子傳</div>
          <div class="classic-text" id="t-tuan"></div>
          <div class="translation" id="t-tuan-trans"></div>
          <div id="t-tuan-comm"></div>
        </div>
        <div class="section-block">
          <div class="sec-label">象傳 Xiangzhuan · 大象</div>
          <div class="classic-text" id="t-xiang"></div>
          <div class="translation" id="t-xiang-trans"></div>
          <div id="t-xiang-comm"></div>
        </div>
      </div>

      <!-- Tab: 六爻 -->
      <div class="tab-content" id="tab-yao">
        <div class="yao-grid" id="t-yao-grid"></div>
      </div>

      <!-- Tab: 說文解字 -->
      <div class="tab-content" id="tab-sz">
        <div style="margin-bottom:1.5rem;font-size:13px;color:var(--text3);line-height:1.8;font-family:var(--sans)">
          以下各字條目依《說文解字》（許慎，東漢，約100年）為主，參照《說文解字注》（段玉裁，清，1815年）補充。
        </div>
        <div class="sz-grid" id="t-sz-grid"></div>
      </div>

      <!-- Tab: 歷代注疏 -->
      <div class="tab-content" id="tab-notes">
        <div id="t-notes-content"></div>
      </div>

      <!-- Tab: 參考文獻 -->
      <div class="tab-content" id="tab-sources">
        <div class="section-block">
          <div class="sec-label">主要文獻</div>
          <div class="source-grid" id="t-sources"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
/* ═══════════════════════════════════════════
   完整六十四卦資料庫（學術版）
   ═══════════════════════════════════════════ */
const HEXAGRAMS = [
  {
    num:1, name:"乾", nameEn:"The Creative · Qian", symbol:"䷀",
    upper:"乾（天）☰", lower:"乾（天）☰",
    nature:"大吉", natureBg:"#f0fff4", natureColor:"#276749",
    keywords:["剛健","創造","天道","君子","龍德","陽氣"],
    gua:"元、亨、利、貞。",
    guaTrans:"大善而嘉會合禮，宜於堅定守正。（王弼本作「元亨利貞」四德連讀，虞翻本作四字各為句）",
    guaComm:[
      {scholar:"王弼",era:"魏·三國（226-249）",book:"《周易注》",
       text:"元者，善之長也；亨者，嘉之會也；利者，義之和也；貞者，事之幹也。",
       trans:"元，是善的最高原則；亨，是美好事物的匯聚；利，是道義的調和；貞，是事業的根幹。"},
      {scholar:"孔穎達",era:"唐（574-648）",book:"《周易正義》",
       text:"此卦純陽，故名乾。乾，健也。言天之體，以健為用，聖人作《易》，本以教人，欲使人法天之用，不法天之體也。",
       trans:"此卦純由陽爻構成，故名乾。乾，健也。天的本體以剛健為作用，聖人作《易》，本是教人效法天之作用，而非效法其本體。"},
      {scholar:"程頤",era:"宋（1033-1107）",book:"《伊川易傳》",
       text:"元亨利貞謂之四德。元者，萬物之始；亨者，萬物之長；利者，萬物之遂；貞者，萬物之成。",
       trans:"元亨利貞稱為四德。元，萬物的起始；亨，萬物的成長；利，萬物的順遂；貞，萬物的完成。"},
      {scholar:"朱熹",era:"宋（1130-1200）",book:"《周易本義》",
       text:"乾，天德也。元，大也；亨，通也；利，宜也；貞，正而固也。文王以乾為大亨而利於正，蓋占得此者，其占如此也。",
       trans:"乾，是天的德性。元，大也；亨，通也；利，宜也；貞，正而固也。文王認為乾是大亨通而利於守正，大凡占得此卦者，其占卜意義如此。"}
    ],
    tuan:"大哉乾元，萬物資始，乃統天。雲行雨施，品物流形。大明終始，六位時成，時乘六龍以御天。乾道變化，各正性命，保合大和，乃利貞。首出庶物，萬國咸寧。",
    tuanTrans:"偉大啊！乾之元德，萬物賴以為始，統攝天道。雲氣運行，雨水施降，萬物各顯其形。光明貫通終始，六爻依時而成，依時駕御六龍以行天道。乾道之變化，使萬物各得其性命之正，保持調和，宜於堅定守正。高於萬物之首，天下萬國皆得安寧。",
    tuanComm:[
      {scholar:"王弼",era:"魏·三國",book:"《周易注》",

    notes:[
      {title:"整體詮釋傳統",content:"乾卦的詮釋史可分為三大系統：（一）象數學派，以虞翻（東漢）為代表，重視卦爻的象徵意涵與陰陽消長；（二）義理學派，以王弼（魏）為代表，以老莊哲學詮釋易理，開「掃象」之風；（三）宋明理學，程頤、朱熹綜合象數與義理，建立天理、心性與易學的貫通體系。"},
      {title:"龍之象徵考",content:"乾卦六爻以龍為象，潛龍、見龍、惕龍、躍龍、飛龍、亢龍，構成完整的發展周期。高亨（1900-1986）考證認為，易經中的龍可能源自古代對彗星或雨季雲氣的觀察，後演化為剛健陽剛之德的象徵。李鏡池則認為龍象與古代農業社會的雨水崇拜密切相關。"},
      {title:"四德說之演變",content:"元亨利貞四德說，在文字詮釋上有顯著分歧。孔子（《彖傳》）將其解為四種宇宙德性；王弼視為一卦之整體占辭；朱熹採取卜筮立場，認為四字是占得此卦的吉象；近代聞一多、高亨等學者則主張應句讀為「元亨，利貞」（大通，利於貞問），回歸占筮本義。"}
    ],

    gua:"元亨，利牝馬之貞。君子有攸往，先迷後得主，利。西南得朋，東北喪朋，安貞吉。",
    guaTrans:"大善而嘉會合禮，宜於像母馬般堅定守正。君子若有所往，開始時迷失，之後能得到主人，宜於如此。往西南可得朋友，往東北則失去朋友，安於堅定守正則吉。",
    guaComm:[
      {scholar:"王弼",era:"魏·三國",book:"《周易注》",
       text:"坤，順也。陰之至，柔之極，地之道也。牝馬地類，行地無疆，柔順利貞，故利牝馬之貞。",
       trans:"坤，順也。陰氣到達頂點，柔性到達極致，大地之道。牝馬屬地之類，行於大地而無邊疆，柔順利貞，故利牝馬之貞。"},
      {scholar:"程頤",era:"宋",book:"《伊川易傳》",
       text:"西南，坤方也，坤為眾陰，故得朋。東北，艮方也，陽方也，陰往則失其類，故喪朋也。",
       trans:"西南，是坤的方位，坤為眾陰，故得朋。東北，是艮的方位，是陽方，陰往陽方則失其同類，故喪朋。"},
      {scholar:"朱熹",era:"宋",book:"《周易本義》",
       text:"此卦六爻皆陰，主靜，主順，與乾為對待，乾主天，坤主地，乾主男，坤主女。",
       trans:"此卦六爻皆陰，主靜主順，與乾卦相對應。乾主天，坤主地；乾主男，坤主女。"}

    tuan:"至哉坤元，萬物資生，乃順承天。坤厚載物，德合無疆，含弘光大，品物咸亨。牝馬地類，行地無疆，柔順利貞，君子攸行。先迷失道，後順得常，西南得朋，乃與類行，東北喪朋，乃終有慶。安貞之吉，應地無疆。",
    tuanTrans:"至極啊！坤的元德，萬物賴以生成，順承天道。坤的厚德承載萬物，德性廣合無邊，包容宏大，萬物皆得通達。牝馬屬地之類，行走大地無窮，柔順且宜於堅定守正，是君子的行事之道。先行則迷失正道，後隨則順得常規，往西南得朋友，與同類而行，往東北失去朋友，最終仍有喜慶。安於堅定守正之吉，是應合大地之無疆德性。",
    tuanComm:[
      {scholar:"孔穎達",era:"唐",book:"《周易正義》",
       text:"坤以至順為德，故曰至哉。萬物各得其宜，皆由坤德之廣也。",
       trans:"坤以至順為德，故稱至極。萬物各得其宜，皆由坤德之廣大。"},
      {scholar:"程頤",era:"宋",book:"《伊川易傳》",
       text:"含弘光大，地之量也。含，包容也；弘，廣大也；光，光輝也；大，充足也。地能包容廣大，發揮光輝，充足萬物，故品物咸亨。",
       trans:"含弘光大，是大地之量。含，包容；弘，廣大；光，光輝；大，充足。大地包容廣大，發揮光輝，充足萬物，故萬物皆得通達。"}

    xiang:"地勢坤，君子以厚德載物。",

    notes:[
      {title:"師道詮釋傳統",content:"蒙卦的核心在「師道」二字。王弼以義理詮釋，強調師者不自降身份，必待學者誠心求教方授；程頤進一步發揮，視啟蒙為天理教化的具體落實；朱熹則從占筮角度入手，指出守貞正是解蒙之道。三者各有側重，形成完整的師道哲學。"},
      {title:"「養正」說的思想意義",content:"彖傳「蒙以養正，聖功也」一句，歷代注釋極為重視。程頤以此為全卦核心，認為教育的目的不在灌輸知識，而在養成正確的德性。朱熹認為「養正」即在幼稚蒙昧之時即守持正道，一旦德性確立，則終生受用。這與儒家「慎始」的教育哲學一脈相承。"},
      {title:"蒙卦與屯卦的關係",content:"序卦傳曰：「物生必蒙，故受之以蒙。」屯卦象徵萬物初生，蒙卦象徵初生後的蒙昧狀態，二者緊密相連。高亨認為蒙卦可能源於古代筮法中關於啟蒙問卜的記錄；聞一多則從文字學角度，考證「蒙」有遮覆、未開發之義，與卦象山水結構相符。"}

      {scholar:"孔穎達",era:"唐（574-648）",book:"《周易正義》",
       text:"需者，需待之義。凡事須有時，不可妄進，故需以有孚，守正而待，天道自通，元亨可期。利涉大川者，以剛健誠信涉險，可以有成。",

      {scholar:"程頤",era:"宋（1033-1107）",book:"《伊川易傳》",
       text:"需者，等待時機之道。有孚，誠信不懈也。元亨者，嘉善之會，誠信以待，時至則通。利貞，守正不二也。以剛健而有誠信，雖有險阻，皆可克服，故利涉大川。",
       trans:"需，是等待時機之道。有孚，是誠信不懈怠。元亨，是嘉善的聚合，以誠信等待，時機到來則通達。利貞，是守正不二。以剛健而有誠信，雖有險阻，皆可克服，故利於渡越大川。"},
      {scholar:"朱熹",era:"宋（1130-1200）",book:"《周易本義》",
       text:"需，待也。以乾遇坎，剛健而陷於險前，未可輕進，故為需待之象。有孚，誠信在中也。占得此者，誠信守正，待時而動，則元亨而可涉大川。",

    sz:[
      {char:"需",pinyin:"xū",radical:"雨部",
       original:"《說文解字》：「需，𩅹也，遇雨不進，止𩅹也。从雨，而聲。」（段玉裁注：需為等待之義，本象雲雨相待之形，引申為凡等待之稱。）",
       trans:"許慎：需，𩅹也，遇雨不前進，停止等待也。從雨，而為聲符。段玉裁注：需為等待之義，本象雲雨相待之形，引申為一切等待之稱。",
       evolution:"甲骨文：从雨从人，人處雨中等待之形。金文：形態穩定。小篆：今形。字義：遇雨等待→等待→需求（後起義）。"},
      {char:"孚",pinyin:"fú",radical:"爪部",
       original:"《說文解字》：「孚，卵孚也。从爪，从子。」（段注：孚本義卵化，引申為信義，蓋鳥孵卵必信時而出，故以孚喻誠信。）",
       trans:"許慎：孚，卵的孵化也。從爪，從子。段注：孚本義為卵的孵化，引申為誠信，蓋鳥孵卵必信守時節而出，故以孚比喻誠信。",
       evolution:"甲骨文：爪持子形，孵卵之象。金文：形態穩定。小篆：今形。字義：孵卵→信實→俘獲（假借）。"},
      {char:"涉",pinyin:"shè",radical:"水部",
       original:"《說文解字》：「涉，徒行瀕水也。从水，步聲。」（段注：徒行渡水，即徒步過河，引申為涉歷、經歷。利涉大川，謂宜於渡大河，象徵克服大難。）",
       trans:"許慎：涉，徒步行走渡水也。從水，步為聲符。段注：徒步渡水，即徒步過河，引申為涉歷、經歷。利涉大川，是說宜於渡越大河，象徵克服重大困難。",
       evolution:"甲骨文：从水从步，人渡水形。金文：形態穩定。小篆：今形。字義：徒步渡水→渡越→涉歷（引申）。"}
    ],
    notes:[
      {title:"「等待」哲學",content:"需卦之「等待」並非消極被動，而是「有孚」的積極守持。王弼強調守正待時；程頤以天道自然詮釋，認為時機自至，妄進則失；朱熹則從占筮角度，指出有孚誠信是需待的根本。三者共同揭示儒家「時中」的核心思想——在適當時機以適當方式行動。"},
      {title:"飲食象徵考",content:"大象傳以「飲食宴樂」詮釋需卦，歷代解釋不一。孔穎達認為此為君子待時的涵養功夫；程頤則強調「從容處世」的義理；近代高亨則認為此句可能保留了周代貴族筮問宴饗吉凶的原始占卜記錄，反映了需卦最早的社會功能。"},
      {title:"需訟相綜",content:"需卦（水天需）與訟卦（天水訟）互為綜卦，卦象上下倒置。序卦傳曰「飲食必有訟，故受之以訟」，揭示二卦之邏輯聯繫：等待飲食時容易生爭執，需待而生爭訟，此為人情之常，亦是易卦排序的深層義理。"}
    ],
    sources:[

 {

    gua:"有孚，窒惕，中吉，終凶。利見大人，不利涉大川。",
    guaTrans:"心懷誠信，卻受阻塞而心存警惕；持中守正則吉，訟至終結則凶。利於出見大人（賢者或君王），不利於渡越大川冒險前行。",
    guaComm:[
      {scholar:"王弼",era:"魏·三國（226-249）",book:"《周易注》",
       text:"訟者，爭訟也。有孚而訟，有其誠信，然訟終非善事，窒塞其進，需心存警惕。中道而止則吉，訟至終則凶。大人能辨曲直，故利見；涉川涉險，非訟時所宜。",
       trans:"訟，是爭訟之義。有誠信而涉訟，雖有其誠信，然爭訟終非善事，受阻塞需心存警惕。持中道而止則吉，訟至終結則凶。大人能辨別是非曲直，故利於出見；渡川涉險，非爭訟之時所宜。"},
      {scholar:"孔穎達",era:"唐（574-648）",book:"《周易正義》",
       text:"訟，爭也。有孚者，雖有誠信，然被窒礙，不得伸申；中吉者，訟不可盡，中道而息則吉；終凶者，訟而不已，必至於凶。利見大人，使公正裁決；不利涉川，非行險之時。",
       trans:"訟，是爭論之義。有孚，雖有誠信，然被窒礙阻塞，不得申伸；中吉，爭訟不可窮盡，中途而止則吉；終凶，爭訟不止，必至凶險。利見大人，使其公正裁決；不利涉川，並非冒險前行的時機。"},
      {scholar:"程頤",era:"宋（1033-1107）",book:"《伊川易傳》",
       text:"訟，非君子之道，雖有誠信，涉訟則窒礙而惕懼。訟以中道而止為吉，訟而至終，必有凶害。利見大人，憑借公正之人以決訟；不利涉大川，涉訟之時宜靜不宜動，宜止不宜進。",
       trans:"訟，並非君子之道，雖有誠信，一涉爭訟則受阻塞而須警惕。訟以持中而止為吉，爭訟至最終，必有凶害。利見大人，憑借公正之人以決斷爭訟；不利涉大川，涉訟之時宜靜不宜動，宜止不宜進。"},
      {scholar:"朱熹",era:"宋（1130-1200）",book:"《周易本義》",
       text:"訟，爭辨也。上乾下坎，剛健與陷險相遇，內險外健，是爭訟之象。有孚而訟，雖有誠信，終非善事，中止則吉，至終則凶。訟須大人決之，故利見；輕進冒險，故不利涉川。",
       trans:"訟，是爭辨之義。上乾下坎，剛健與陷險相遇，內險外健，是爭訟之象。有誠信而涉訟，雖有誠信，終非善事，中途停止則吉，至最終則凶。爭訟須有大人裁決，故利見大人；輕率前進冒險，故不利涉大川。"}
    ],
    tuan:"訟，上剛下險，險而健，訟。訟，有孚，窒，惕，中吉，以剛來而得中也。終凶，訟不可成也。利見大人，尚中正也。不利涉大川，入於淵也。",
    tuanTrans:"訟卦，上卦剛健下卦險陷，遇險而仍剛健，是爭訟之象。訟卦有誠信，受阻塞，心存警惕，中途吉祥，是以剛爻居來位而得中；最終凶，是爭訟不可成全。利見大人，是崇尚中正；不利涉大川，是如陷入深淵。",
    tuanComm:[
      {scholar:"王弼",era:"魏·三國",book:"《周易注》",
       text:"訟之所起，以剛健遇險陷，兩者相抗而訟生。中吉以剛得中，終凶以訟不可竟，大人尚正以決之。",
       trans:"爭訟的起因，是以剛健遇上險陷，兩者相抗而訟事由生。中吉是因剛爻得中位，終凶是因爭訟不可竟全，大人崇尚中正以裁決。"},
      {scholar:"程頤",era:"宋",book:"《伊川易傳》",
       text:"訟不可成也，非謂訟皆不可，是訟至終皆凶，以其傷仁義也。大人能持正以斷，故利見。",
       trans:"爭訟不可成全，並非說爭訟皆不可，而是說爭訟至最終皆凶，因其傷害仁義。大人能持中正以裁斷，故利於見大人。"}

       trans:"天道向上運行，水性向下流淌，天與水方向相違，是爭訟之象。君子觀此，知爭訟源於謀劃不周，故在謀劃開始時便審慎計議，杜絕爭訟的根源。"},
      {scholar:"朱熹",era:"宋",book:"《周易本義》",
       text:"天上水下，違行相背，訟之象。君子觀此，知事端生於謀始不審，故凡作事，必謀其始，使無爭訟之端。",
       trans:"天在上水在下，運行相背，是訟爭之象。君子觀此，知事端生於謀劃開始不審慎，故凡做事，必從一開始便謀劃周全，使無爭訟之端。"}

      {title:"「中吉終凶」的辯證",content:"訟卦的核心是「中吉終凶」的辯證思想。王弼詮釋為「訟不可竟」，程頤以「傷仁義」解釋終凶，朱熹則從現實角度強調訟事耗損。三者共同揭示了儒家對爭訟的基本態度：爭訟是不得已之道，中途化解優於強求取勝。"},

      {title:"需訟對照",content:"需卦（水天需）與訟卦（天水訟）上下倒置，互為綜卦。需待時以誠，訟則以剛遇險。序卦傳謂「飲食必有訟」，高亨認為此反映了早期社會飲食分配引發糾紛的現實；聞一多則注意到訟卦爻辭保留了大量關於土地、戶籍糾紛的史料痕跡。"}

    gua:"貞，丈人吉，无咎。",
    guaTrans:"堅定守正，由德高望重的丈人（主帥）統帥則吉，無過失。",
    guaComm:[
      {scholar:"王弼",era:"魏·三國（226-249）",book:"《周易注》",
       text:"師者，眾也，以一人統眾，必以貞正。丈人，長老有德者，能統軍旅而使眾服，故吉而无咎。若非其人，雖師眾，終凶也。",
       trans:"師，是眾人之義，以一人統率眾人，必以貞正為本。丈人，是德高望重的長老，能統領軍旅而使眾人信服，故吉而無過失。若非其人，雖有師眾，終究凶險。"},
      {scholar:"孔穎達",era:"唐（574-648）",book:"《周易正義》",
       text:"師，師旅也。出師用兵，宜以正道，故曰貞。丈人者，有德之老成人，知用兵之節，能使眾服而不輕動，故吉无咎。",
       trans:"師，是師旅軍旅之義。出師用兵，應以正道，故曰貞。丈人，是有德的老成人，知曉用兵的節度，能使眾人信服而不輕易動兵，故吉而無過失。"},
      {scholar:"程頤",era:"宋（1033-1107）",book:"《伊川易傳》",
       text:"師者，眾也，用兵之道也。用兵必以貞正，非正不可以統師。丈人，謂有大德之人，能以義統師，上下信服，故吉无咎。",
       trans:"師，是眾人軍旅之義，是用兵之道。用兵必以貞正，非正道不可以統率師旅。丈人，是有大德之人，能以正義統率師旅，上下信服，故吉而無過失。"},

       text:"師，兵眾也。下坎上坤，水在地中，兵眾藏於民間之象。貞者，正也。丈人，有威德者。師必以正，由有威德者統之，則吉而无咎。",

    tuan:"師，眾也；貞，正也；能以眾正，可以王矣。剛中而應，行險而順，以此毒天下，而民從之，吉又何咎矣。",

    tuanComm:[
      {scholar:"王弼",era:"魏·三國",book:"《周易注》",
       text:"能以眾正，王道也。剛中而應，謂九二也；行險而順，是以正統師，民皆從之。",

      {scholar:"程頤",era:"宋",book:"《伊川易傳》",
       text:"毒天下者，以師旅之役苦天下，然以義而行，民雖受苦，知其正義，故能從之。師之用，在得民心也。",

      {title:"「原筮」的詮釋問題",content:"比卦「原筮」二字，歷代異說紛紜。王弼以「反復推原」解之；孔穎達採「重新占筮」說；程頤則偏向「審察其初心」的義理詮釋；朱熹則回歸卜筮本義，認為原筮是告訴占者應重審占問。近代高亨從文字學出發，認為「原」可能是「源」的假借，整句意為「推尋其源，占問」，較貼近原始語境。"},

       trans:"小畜，是以小蓄積大，以柔能蓄制剛健。亨通，是一個柔爻得位，眾陽雖剛健，皆為其所蓄制，道雖可行，時機尚未大通，故密雲而未能降雨。自我西郊，是陰氣所聚之方，蓄積而尚未施降。"},
      {scholar:"孔穎達",era:"唐（574-648）",book:"《周易正義》",
       text:"小畜，謂六四一陰畜止五陽也。亨者，柔得位，柔能制剛，此小畜之道也。密雲不雨，陰氣雖盛，未能下施，猶人之積德，雖已積聚，功業未成。自我西郊，兌為西，巽為近西，陰氣自西而來，蓄而未雨之象。",
       trans:"小畜，是說六四一個陰爻蓄止五個陽爻。亨通，是柔得位，柔能制約剛，此乃小畜之道。密雲不雨，陰氣雖盛，未能下施降雨，猶人之積德，雖已積聚，功業尚未成就。自我西郊，兌為西，巽接近西方，陰氣自西而來，是蓄積而未降雨之象。"},
      {scholar:"程頤",era:"宋（1033-1107）",book:"《伊川易傳》",
       text:"小畜，以小蓄大之義。一柔五剛，柔不能大畜，故為小畜。密雲不雨，自我西郊，陰陽交而未和，猶君子積德待時，時未至而功未成也。",
       trans:"小畜，是以小蓄積大的義意。一柔五剛，柔不能大力蓄積，故為小畜。密雲不雨，自我西郊，陰陽相交而未和諧，猶如君子積德待時，時機未至而功業未成。"},
      {scholar:"朱熹",era:"宋（1130-1200）",book:"《周易本義》",
       text:"小畜，小者畜大者也。以六四一陰居四，上下五陽皆為所畜。畜，止也。然陰力小，不能大止，故卦名小畜。密雲不雨，陰道始盛，蓄氣上行，而陽氣猶盛，不能成雨。西郊，陰方，陰氣尚在積聚，待時而施，占者如此，當積德以待時。",
       trans:"小畜，是小者蓄積大者。以六四一個陰爻居四位，上下五個陽爻皆為其所蓄止。畜，止也。然陰力小，不能大力止制，故卦名小畜。密雲不雨，陰道始盛，蓄氣上行，而陽氣仍盛，不能成雨。西郊，陰方，陰氣尚在積聚，待時而施，占得此卦，應積德以待時。"}

    tuan:"小畜，柔得位而上下應之，曰小畜。健而巽，剛中而志行，乃亨。密雲不雨，尚往也；自我西郊，施未行也。",
    tuanTrans:"小畜，柔爻得位而上下五陽皆應之，稱為小畜。乾健巽順，剛中而志意可行，故通達。密雲不雨，是陰氣尚在向上聚積；自我西郊，是陰德之施尚未能推行。",

      {scholar:"程頤",era:"宋",book:"《伊川易傳》",
       text:"尚往，陰氣尚在上行積聚，未能下施為雨。施未行，德澤尚未廣布，猶人積學未能施用。",

    sz:[
      {char:"畜",pinyin:"xù / chù",radical:"田部",
       original:"《說文解字》：「畜，田畜也。从田，兹省聲。」（段玉裁注：畜有二義，一為蓄養，二為牲畜。易之小畜大畜皆取蓄止、積聚之義，非指牲畜。）",
       trans:"許慎：畜，田中蓄養也。從田，兹省為聲符。段玉裁注：畜有二義，一為蓄養積聚，二為牲畜。易經小畜大畜皆取蓄止、積聚之義，並非指牲畜。",
       evolution:"甲骨文：田中有絲繩束縛之形，蓄積義。金文：形態穩定。小篆：今形。字義：蓄積→畜牧→停止（引申群）。"},
      {char:"懿",pinyin:"yì",radical:"壹部",
       original:"《說文解字》：「懿，專久而美也。从壹，恣省聲。」（段注：懿，美之深固者。君子以懿文德，謂深固其文明之德，非表面之美飾也。）",
       trans:"許慎：懿，專注持久而美好也。從壹，恣省為聲符。段注：懿，是深固而美之義。君子以懿文德，是深固其文明之德，並非表面的美飾。",
       evolution:"甲骨文：專心之形。金文：形態穩定。小篆：今形。字義：深固之美→美好→嘉懿（引申）。"},

       trans:"許慎：攣，相連繫也。從手，䜌為聲符。段注：攣，是相連繫之義。有孚攣如，是以誠信相連，上下相繫，不致離散。",

    notes:[
      {title:"小畜與大畜之辨",content:"小畜（風天）與大畜（山天）共同以「畜」為名，而一小一大。王弼以柔爻數量辨之：小畜一柔，大畜二柔；程頤以蓄止力量辨之：小畜止而未大，大畜則止力深厚；朱熹則兼采二說。近代高亨認為「畜」有「蓄積」與「停止」雙重義，小畜偏重積聚未施，大畜偏重完全止制。"},
      {title:"「密雲不雨」的文化意象",content:"小畜卦的「密雲不雨，自我西郊」是《周易》中最具詩意的卦辭之一。歷代注釋有氣象說（孔穎達）、地理說（以周之西都為據）、哲學說（程頤以此象徵積德未施）三大系統。《詩經·小雅·無將大車》亦有「密雲不雨，自我西郊」句，高亨認為易辭與詩句可能共同源自一個關於西北季風的古代自然觀察。"},
      {title:"「懿文德」的修身哲學",content:"大象傳「君子以懿文德」一句，是小畜卦對君子的核心啟示。孔穎達強調「懿」有深固之美的內涵，非表面修飾；程頤以此連結「積德待時」的儒家理想；朱熹則指出小畜之時宜修己而不宜施政。三者共同指向一個觀點：力量尚小時，向內積累比向外施展更為根本。"}
    ],

 {

    gua:"履虎尾，不咥人，亨。",
    guaTrans:"踩踏虎尾，老虎不咬人，嘉會通達。",
    guaComm:[
      {scholar:"王弼",era:"魏·三國（226-249）",book:"《周易注》",
       text:"履者，禮也。以說應乾，柔履剛也，以柔和悅順之德踐履剛健之道，雖履虎尾，以其無忤，故虎不咥人而亨。履禮者，雖履危地，以誠謹行，終不見害。",
       trans:"履，是禮之義。以悅順應乾，柔爻踐履剛爻，以柔和悅順之德踐履剛健之道，雖踩踏虎尾，以其無所冒犯，故老虎不咬人而通達。踐履禮儀者，雖踐履危地，以誠謹行事，終不見害。"},
      {scholar:"孔穎達",era:"唐（574-648）",book:"《周易正義》",
       text:"履，踐也，禮也。下兌說，上乾健，以悅順踐履健道，雖涉危境，不忤其威，故虎不咥人。履之為義，在於知禮守分，各安其位，雖處危地，終得通達。",
       trans:"履，是踐履之義，也是禮之義。下兌悅順，上乾剛健，以悅順踐履剛健之道，雖涉及危境，不冒犯其威，故老虎不咬人。履卦的義意，在於知禮守分，各安其位，雖處危地，終得通達。"},
      {scholar:"程頤",era:"宋（1033-1107）",book:"《伊川易傳》",
       text:"履，踐禮也。天下之禮，莫大乎正名分、辨尊卑。以兌之悅，從乾之健，柔順踐履禮法，雖危地亦安，虎尾之危，以禮行之，虎不傷人，乃禮之力也。",
       trans:"履，是踐履禮法之義。天下之禮，莫大於正名分、辨尊卑。以兌之悅順，從乾之剛健，柔順踐履禮法，雖危地亦能安然，虎尾之危，以禮行之，老虎不傷人，此乃禮的力量。"},
      {scholar:"朱熹",era:"宋（1130-1200）",book:"《周易本義》",
       text:"履，踐也，禮也。以兌遇乾，一柔五剛，有柔履剛之象。虎尾，危也。以悅從健，處危不懼，行禮而進，故虎不咥人而亨。占得此者，以禮自持，雖涉險地，可以無害。",
       trans:"履，踐履也，禮也。以兌遇乾，一柔五剛，有柔爻踐履剛爻之象。虎尾，危也。以悅順從剛健，處危不懼，行禮而前進，故老虎不咬人而通達。占得此卦者，以禮自持，雖涉險地，可以無害。"}

    notes:[
      {title:"履與禮的哲學關係",content:"「履」與「禮」在音義上高度相關，歷代注釋幾乎無一不論及。王弼率先以禮詮履，認為履卦的核心即是禮的踐行；程頤進一步發揮，將辨上下、定名分視為禮的社會功能，與大象傳「辨上下，定民志」相互呼應；朱熹則兼顧占筮，以「知禮守分」為占得此卦的行事準則。三者共同確立了「履即禮」的詮釋傳統。"},
      {title:"「履虎尾」的象徵意義",content:"虎尾作為危險象徵，歷代解釋集中在「危而不咬」的弔詭上。孔穎達以「不忤其威」解釋不被咬；程頤以「禮之力」說明禮能化危；朱熹強調「悅從健」的心理狀態——柔順而非對抗，才是安全的根本。近代聞一多考證「虎尾」可能源自周代田獵儀式中真實的危險場景，後被抽象化為禮義行事的象徵。"},
      {title:"小畜履對卦",content:"小畜（風天）與履（天澤）互為錯卦（旁通），《序卦傳》曰「物畜然後有禮，故受之以履」，揭示積蓄之後才有禮的行用——先有內在積聚，後有外在踐履。程頤以此說明修身次序：先養德（小畜），後行禮（履）。二卦前後相承，構成完整的修身哲學。"}

    guaComm:[
      {scholar:"王弼",era:"魏·三國（226-249）",book:"《周易注》",
       text:"泰者，通也。天地相交，陰陽和合，乃泰之義。小謂陰，往謂居外；大謂陽，來謂居內。陽剛居內，陰柔居外，君子道長，小人道消，故吉亨。",
       trans:"泰，是通達之義。天地相交，陰陽和合，乃泰卦之義。小，是指陰；往，是說居外；大，是指陽；來，是說居內。陽剛居內，陰柔居外，君子之道增長，小人之道消減，故吉祥通達。"},
      {scholar:"孔穎達",era:"唐（574-648）",book:"《周易正義》",
       text:"泰，通也，安也。下乾上坤，天地相交，陰陽和通，萬物生息，君子道長，小人道消，此天地人三才和順之象，故吉亨。",
       trans:"泰，是通達、安泰之義。下乾上坤，天地相交，陰陽和通，萬物生息，君子之道增長，小人之道消減，此乃天地人三才和順之象，故吉祥通達。"},
      {scholar:"程頤",era:"宋（1033-1107）",book:"《伊川易傳》",
       text:"泰者，天地交通，上下和合之時也。乾健在下，坤順在上，天氣下降，地氣上升，陰陽交感，萬物化生。君子道長，小人道消，此泰之盛象，故吉亨。",
       trans:"泰，是天地交通，上下和合之時。乾健在下，坤順在上，天氣下降，地氣上升，陰陽交感，萬物化生。君子之道增長，小人之道消減，此乃泰卦的盛象，故吉祥通達。"},
      {scholar:"朱熹",era:"宋（1130-1200）",book:"《周易本義》",
       text:"泰，通也。乾下坤上，天地交而氣通，此泰之象。小謂陰，往外也；大謂陽，來內也。內陽外陰，內健外順，上下和通，故吉亨。占得此者，萬事通達，宜大有作為。",
       trans:"泰，是通達之義。乾下坤上，天地相交而氣通，此乃泰之象。小，是指陰，往外；大，是指陽，來內。內陽外陰，內健外順，上下和通，故吉祥通達。占得此卦者，萬事通達，宜大有作為。"}

    tuanComm:[

      {name:"九三",pos:"第三爻（陽）",badge:"平陂往來",badgeBg:"#fff8e1",badgeColor:"#b7791f",

         {scholar:"程頤",era:"宋",book:"《伊川易傳》",text:"三處泰之終，泰極將否，故戒以無平不陂、無往不復之理，艱貞守正則无咎，此居安思危之道也。",trans:"九三處泰卦之終，泰極將變為否，故以無平不陂、無往不復之理加以警戒，艱難中守正則無過失，此乃居安思危之道。"}

    sz:[
      {char:"泰",pinyin:"tài",radical:"水部",
       original:"《說文解字》：「泰，滑也。从廾，从水，大聲。」（段玉裁注：泰本義為水滑，引申為通達、安泰。易之泰卦，取通達安泰之義，非本義之水滑。）",
       trans:"許慎：泰，滑也。從廾，從水，大為聲符。段玉裁注：泰本義為水流滑順，引申為通達、安泰。易經泰卦，取通達安泰之義，並非本義的水滑。",
       evolution:"甲骨文：水流之形，有滑順義。金文：形態穩定。小篆：今形。字義：水滑→通達→安泰→泰然（引申）。"},
      {char:"隍",pinyin:"huáng",radical:"阜部",
       original:"《說文解字》：「隍，城池也。有水曰池，無水曰隍。从阜，皇聲。」（段注：隍為無水之城壕，城復于隍謂城牆傾塌還歸壕溝，乃泰極而衰之象。）",
       trans:"許慎：隍，城壕也。有水稱池，無水稱隍。從阜，皇為聲符。段注：隍是無水的城壕，城復于隍，是城牆傾塌還歸壕溝，乃泰極而衰之象。",
       evolution:"甲骨文：城壕形。金文：从阜从皇。小篆：今形。字義：無水城壕→城壕（廣義）→傾圮象徵。"},
      {char:"陂",pinyin:"bēi / pō",radical:"阜部",
       original:"《說文解字》：「陂，阪也。一曰池也。从阜，皮聲。」（段注：陂有坡陂、傾斜義，無平不陂，謂平坦之地必有傾斜，此言物不恆平之道理。）",
       trans:"許慎：陂，斜坡也。另一義為池塘。從阜，皮為聲符。段注：陂有坡陂、傾斜之義，無平不陂，是說平坦之地必有傾斜，此言萬物不能永遠平穩的道理。",

    notes:[
      {title:"泰否對卦的辯證思維",content:"泰卦（地天泰）與否卦（天地否）互為錯卦，象徵通泰與閉塞的兩極。王弼以陰陽消長詮釋泰否之變；程頤以「物極必反」為核心，在泰卦上六中特別提示「居安思危」；朱熹則從政治哲學角度，指出天地不交（否）是亂世之象，天地相交（泰）是治世之象。泰否的轉換，是儒家治亂觀的易學根據。"},
      {title:"「后以財成天地之道」的施政哲學",content:"泰卦大象傳「財成天地之道，輔相天地之宜」是《易傳》中最具政治哲學深度的句子之一。孔穎達以「裁制」解「財成」，強調君王的主動制裁與調節；程頤以「輔相天地」說明君王必須因循自然規律，而非強為；朱熹則指出「左右民」是結果，強調施政的最終目標在於民眾各得其所。"},
      {title:"帝乙歸妹考",content:"「帝乙歸妹」同時出現於泰卦六五與歸妹卦六五，是《周易》中少數直接點名歷史人物的記載。帝乙為殷代倒數第二位王，以嫁妹方式進行政治聯姻。高亨認為此處記錄了真實的政治史事；聞一多則從文字學考證，認為「歸妹」為古代嫁女之專稱，帝乙歸妹象徵以謙遜柔順之道行於尊位的治道理想。"}
    ],

 {
    num:12, name:"否", nameEn:"Standstill · Pi", symbol:"䷋",

    gua:"否之匪人，不利君子貞，大往小來。",
    guaTrans:"閉塞不通，非正人之道，不利於君子守正，大者（陽）往去，小者（陰）而來。",
    guaComm:[
      {scholar:"王弼",era:"魏·三國（226-249）",book:"《周易注》",
       text:"否者，閉也，塞也。天地不交，萬物不通，非人道之正，故匪人。不利君子貞，小人道長之時，君子雖貞正，難以有為。大往小來，陽剛退外，陰柔進內，否塞之象也。",
       trans:"否，是閉塞、阻塞之義。天地不相交，萬物不通，非人道之正，故說匪人。不利君子貞，是小人之道增長之時，君子雖守正，難以有所作為。大往小來，陽剛退外，陰柔進內，是閉塞之象。"},
      {scholar:"孔穎達",era:"唐（574-648）",book:"《周易正義》",
       text:"否，閉也，不通也。上乾下坤，天在上而地在下，各居其正位，然不相交通，故否。匪人，非人道也；不利君子貞，否塞之世，君子雖守正，難有施展；大往小來，陽往外，陰來內，小人道長，君子道消。",
       trans:"否，閉塞、不通之義。上乾下坤，天在上地在下，各居其正位，然不相交通，故否。匪人，是非人道；不利君子貞，是閉塞之世，君子雖守正，難有施展；大往小來，陽往外，陰來內，小人之道增長，君子之道消減。"},
      {scholar:"程頤",era:"宋（1033-1107）",book:"《伊川易傳》",
       text:"否者，閉塞不通之時也。天地雖各得其位，然不相交感，故萬物不通。此小人道長，君子道消之世，君子當知時，不宜強行，宜保身養德以待泰也。",
       trans:"否，是閉塞不通之時。天地雖各得其位，然不相交感，故萬物不通。此乃小人之道增長、君子之道消減之世，君子當識時，不宜強行，宜保身養德以待泰卦到來。"},
      {scholar:"朱熹",era:"宋（1130-1200）",book:"《周易本義》",
       text:"否，閉塞也。與泰正相反，天地不交，萬物否塞。匪人，言非人道之通也。不利君子貞，否塞之時，正道難行。大往小來，陽往外，陰來內，小人用事之象，占此當審時知變。",
       trans:"否，閉塞也。與泰卦正相反，天地不相交，萬物否塞。匪人，是說非人道之通。不利君子貞，否塞之時，正道難行。大往小來，陽往外，陰來內，小人用事之象，占得此卦應審時知變。"}
    ],
    tuan:"否之匪人，不利君子貞，大往小來。則是天地不交而萬物不通也，上下不交而天下无邦也；內陰而外陽，內柔而外剛，內小人而外君子。小人道長，君子道消也。",
    tuanTrans:"否卦閉塞非人道，不利君子守正，大者往去小者來。這是天地不相交而萬物不通，上下不相交而天下無邦；內為陰而外為陽，內為柔而外為剛，內為小人而外為君子。小人之道增長，君子之道消減。",
    tuanComm:[
      {scholar:"王弼",era:"魏·三國",book:"《周易注》",
       text:"天下无邦，言邦國不能立也，上下不交，人道廢也。內小人外君子，小人居朝，君子在野，是否之象也。",
       trans:"天下無邦，是說邦國不能立，上下不相交，人道廢弛。內小人外君子，小人居朝廷，君子在野間，是否卦之象。"},
      {scholar:"程頤",era:"宋",book:"《伊川易傳》",
       text:"內陰外陽，陰主內事，小人也；陽主外用，君子也。小人在內，君子在外，是小人用事，君子退處之時，否之大義也。",
       trans:"內陰外陽，陰主內事，是小人；陽主外用，是君子。小人在內，君子在外，是小人用事、君子退處之時，這是否卦的大義。"}

    sz:[
      {char:"否",pinyin:"pǐ / fǒu",radical:"口部",
       original:"《說文解字》：「否，不也。从口，从不。」（段玉裁注：否有二讀，pǐ為卦名及閉塞義，fǒu為否定義。否卦之否讀pǐ，閉塞不通之義，与泰相反。）",

      {char:"儉",pinyin:"jiǎn",radical:"人部",

    notes:[
      {title:"否泰辯證的哲學意涵",content:"否卦與泰卦是《周易》中最典型的一對對立卦象，共同構成「否極泰來」這一影響中國文化最深的哲學命題。王弼以陰陽消長詮釋；程頤強調「居安思危」——即使處否，亦需以否中求泰之道自持；朱熹則從政治學角度，以天地不交詮釋亂世，以天地相交詮釋治世。三者共同建構了儒家應對逆境的完整哲學。"},
      {title:"「君子以儉德辟難」的處世哲學",content:"否卦大象傳「儉德辟難，不可榮以祿」一句，是儒家在逆境中的處世準則。孔穎達強調「儉德」不僅是節儉，更是收斂自持；程頤以此詮釋君子在小人道長之世的生存策略：不求顯達，以德自保；朱熹則聯繫老子「韜光養晦」的精神，認為否之時宜退守，不宜前進。"},
      {title:"「其亡其亡，繫于苞桑」的警戒傳統",content:"否卦九五「其亡其亡，繫于苞桑」成為中國政治智慧中「居安思危」的經典表達。程頤以聖人「念念不忘覆亡之憂」詮釋，認為此乃德政的根本；朱熹以「苞桑根深」比喻德基深厚，越思危則越穩固；近代研究者則注意到此句可能保留了殷周之際政治動盪的歷史記憶，「苞桑」或有具體的地理背景。"}

 {

    gua:"同人于野，亨。利涉大川，利君子貞。",
    guaTrans:"在廣野與人和同，嘉會通達。利於渡越大川，利於君子守正。",
    guaComm:[
      {scholar:"王弼",era:"魏·三國（226-249）",book:"《周易注》",
       text:"同人者，與人和同也。野，廣遠之地，無私黨之域。和同於野，不限門戶，以公道和同天下，故亨。以乾之健，能克險難，故利涉大川。君子以公同人，故利君子貞。",
       trans:"同人，是與人和同之義。野，是廣遠之地，無私黨的地域。在廣野和同，不限門戶，以公道和同天下，故通達。以乾之剛健，能克服險難，故利於渡越大川。君子以公道和同，故利於君子守正。"},
      {scholar:"孔穎達",era:"唐（574-648）",book:"《周易正義》",
       text:"同人，和同也。同人于野，謂廣同天下之人，不限親疏，在廣野中公開和同，非僅同於一邑之人。亨者，公道廣同故通達。利君子貞，和同以正，非私比也。",
       trans:"同人，是和同之義。同人于野，是廣泛和同天下之人，不限親疏遠近，在廣野中公開和同，並非僅和同於一邑之人。亨，是公道廣同故通達。利君子貞，是以正道和同，並非私黨相比。"},
      {scholar:"程頤",era:"宋（1033-1107）",book:"《伊川易傳》",
       text:"同人，與人同也。野，廣遠無涯之地，同人於此，公同天下也。非黨同一隅之小同，乃公天下之大同。以乾健離明，能克難而同，故利涉大川。君子以公道同人，故利君子貞。",
       trans:"同人，是與人同之義。野，是廣遠無涯之地，在此與人同，是公同天下。並非黨同一隅的小同，而是公天下的大同。以乾健離明，能克服困難而和同，故利於渡越大川。君子以公道和同，故利於君子守正。"},
      {scholar:"朱熹",era:"宋（1130-1200）",book:"《周易本義》",
       text:"同人，與人同也。下離上乾，火性上炎，同於天，上下和同之象。野者，廣大之地，非私黨偏比之所。以剛中正，廣同天下，故亨。利涉大川，以乾健能克險；利君子貞，以正道同人，非私黨也。",
       trans:"同人，是與人同之義。下離上乾，火性上炎，同於天，是上下和同之象。野，是廣大之地，並非私黨偏比之所。以剛中正，廣同天下，故通達。利涉大川，是以乾健能克險阻；利君子貞，是以正道和同，並非私黨。"}

      {scholar:"程頤",era:"宋",book:"《伊川易傳》",
       text:"文明以健，離為文明，乾為剛健；中正而應，六二中正，九五中正，上下相應。唯君子能通天下之志，小人唯私，無以通也。",

    notes:[
      {title:"「同人于野」的公私之辨",content:"同人卦的核心詮釋問題，在於「野」與「宗」「門」「郊」的層次差異。王弼率先建立了野（公）vs. 宗（私）的對立詮釋框架；程頤發揮為「公天下之大同」vs. 「黨同一隅之小同」；朱熹則指出「野」象徵無私黨、無門戶之見的廣大公道。三者共同確立了同人卦「公道和同」的核心義理，深刻影響了儒家的政治哲學。"},
      {title:"「類族辨物」的認識論意義",content:"大象傳「君子以類族辨物」在哲學史上頗具討論價值。孔穎達以「辨物知類」詮釋；程頤強調「知同異後方能大同」，認為辨別是和同的前提；朱熹則聯繫邏輯分類的思維，認為類族辨物是認知世界的基本方法。近代學者注意到此句與先秦名學「辨同異」的思想脈絡相通。"},
      {title:"同人與大有的對待關係",content:"同人（天火同人）與大有（火天大有）互為綜卦，上下倒置。序卦傳曰「與人同者物必歸焉，故受之以大有」，揭示：廣同天下之後，萬物自然歸聚。程頤進一步詮釋：同人是我與人同，大有是物歸我有，二者是「以同致有」的因果關係，構成儒家「廣德得物」的政治邏輯。"}

      {scholar:"程頤",era:"宋（1033-1107）",book:"《伊川易傳》",

       trans:"大有，是所擁有廣大之義。一柔五剛，柔居尊位，以柔順謙遜而有天下。元亨，是大善的嘉會，是說德大而四方歸服，萬物皆通。大有之道，以謙遜以文明，以剛健以正道，四德皆備而大善通達。"},

       text:"大有，所有之大也。六五一陰居尊，五陽皆歸，大有之象。上離下乾，文明以剛健，此大有之德。元亨，大善嘉會之占辭，占此者德大道正，萬事通達。",

    notes:[
      {title:"大有卦「元亨」二字考",content:"大有卦卦辭僅「元亨」二字，是六十四卦中最簡潔的卦辭之一。王弼以「德大而嘉通」詮釋；孔穎達以「大善之嘉會」詮釋，特別指出這不僅是通達，更是盛德廣有的極致；程頤以四德備而元亨，強調其完滿性；朱熹則回歸占筮立場，指出占得此者德大道正，萬事通達。"},
      {title:"「遏惡揚善，順天休命」的政治哲學",content:"大有卦大象傳「遏惡揚善，順天休命」一句，是儒家賞善罰惡政治哲學的易學根據。孔穎達強調此乃「大有之用」，廣有之後必須善用；程頤以「順天道、順人道」詮釋「順天休命」；朱熹則指出此句揭示大有之道的本質：廣有不是目的，遏惡揚善才是廣有的意義所在。"},
      {title:"同人大有的相生關係",content:"同人（天火同人）與大有（火天大有）互為綜卦，且在卦序上緊鄰。序卦傳的邏輯是：廣同天下後，萬物必歸。程頤指出：同人是「與人同」，大有是「物歸我有」，二者構成「以同致有」的因果鏈。這一觀察深刻揭示了人際和同與物質豐盛的辯證關係：真正的廣有源自廣同，而非貪求。"}

    gua:"亨，君子有終。",

      {scholar:"王弼",era:"魏·三國（226-249）",book:"《周易注》",
       text:"謙者，謙遜不自滿也。上坤下艮，山藏地中，高而能下，是謙之象。六爻皆吉，謙德之盛也。亨，謙則通，驕則塞。君子有終，謙以持終，終始如一，故有終也。",
       trans:"謙，是謙遜不自滿之義。上坤下艮，山藏地中，高者能下，是謙之象。六爻皆吉，謙德之盛。亨，謙遜則通達，驕傲則閉塞。君子有終，以謙德持守終始，終始如一，故有善終。"},
      {scholar:"孔穎達",era:"唐（574-648）",book:"《周易正義》",
       text:"謙，退讓也。山在地中，高藏於卑，謙之大象。謙道使人亨通，驕傲使人閉塞，天道人道皆如此。君子有終，君子以謙終始，雖終猶謙，非得意而忘形也。",
       trans:"謙，是退讓之義。山在地中，高藏於低下，是謙的大象。謙道使人通達，驕傲使人閉塞，天道人道皆如此。君子有終，君子以謙終始，雖至終仍謙，並非得意而忘形。"},

       text:"謙，有而不居，盈而若虛之德也。山在地中，至高而藏至卑，謙之象也。謙則亨，萬理皆通；君子有終，君子守謙，可以保終，此謙德之大用也。",
       trans:"謙，是擁有而不自居，盈滿而若虛空的德性。山在地中，至高而藏至卑，是謙之象。謙遜則通達，萬理皆通；君子有終，君子守謙，可以保善終，此乃謙德的大用。"},
      {scholar:"朱熹",era:"宋（1130-1200）",book:"《周易本義》",
       text:"謙，有而不居也。山至高，藏地中，高反在下，謙之象。六爻皆吉，謙道感通。亨，謙道自通；君子有終，謙以終始，無驕縱之失，故有終。占此者，宜謙以自持。",
       trans:"謙，是擁有而不自居之義。山至高，藏地中，高反在下，是謙之象。六爻皆吉，謙道感通。亨，謙道自然通達；君子有終，以謙終始，無驕縱之失，故有善終。占得此卦者，宜以謙遜自持。"}

    notes:[
      {title:"謙卦六爻皆吉的特殊地位",content:"《周易》六十四卦中，謙卦是唯一六爻皆無凶咎的卦，此點歷代注釋無一不論。王弼以「謙道感通天地鬼神人道」解釋；程頤以「天地鬼神人道皆損盈益謙」作為六爻皆吉的宇宙論根據；朱熹則指出此乃謙道的根本特質——謙無處不宜，故六爻皆吉。近代學者認為謙卦六爻皆吉，可能反映了周代貴族對謙德的高度推崇。"},
      {title:"「天道損盈益謙」的宇宙哲學",content:"謙卦彖傳「天道虧盈而益謙，地道變盈而流謙，鬼神害盈而福謙，人道惡盈而好謙」，是《易傳》中最完整的謙德宇宙哲學論述。程頤以此說明謙德超越人情私見，是宇宙的普遍法則；朱熹強調「四道皆然」，謙德乃萬物之道；近代熊十力則進一步發揮，認為此句揭示了「滿招損，謙受益」是自然與人文的共同規律。"},

const NATURES=["大吉","吉","宜守","宜慎","宜學","宜等","宜退","宜觀","宜待"];
let currentHex=null;
let activeTab='gua';
let filterNature='全部';

function init(){
  const d=new Date();
  document.getElementById('topbar-date').textContent=
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  renderFilters();
  renderList(HEXAGRAMS);
}

function renderFilters(){
  const wrap=document.getElementById('filter-wrap');
  ['全部',...NATURES].forEach(n=>{
    const btn=document.createElement('button');
    btn.className='f-btn'+(n==='全部'?' active':'');
    btn.textContent=n;btn.dataset.n=n;
    btn.onclick=()=>setFilter(n);
    wrap.appendChild(btn);
  });
}
function setFilter(n){
  filterNature=n;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.toggle('active',b.dataset.n===n));
  const list=n==='全部'?HEXAGRAMS:HEXAGRAMS.filter(h=>h.nature===n);
  renderList(list);
}
function filterList(q){
  const v=q.trim();
  const list=v
    ?HEXAGRAMS.filter(h=>h.name.includes(v)||h.nameEn.toLowerCase().includes(v.toLowerCase())||String(h.num)===v||h.keywords.some(k=>k.includes(v)))
    :(filterNature==='全部'?HEXAGRAMS:HEXAGRAMS.filter(h=>h.nature===filterNature));
  renderList(list);
}
function renderList(list){
  const el=document.getElementById('hex-list');
  el.innerHTML='';
  list.forEach(h=>{
    const item=document.createElement('div');
    item.className='hex-item'+(currentHex&&currentHex.num===h.num?' active':'');
    item.innerHTML=`
      <div class="hex-symbol">${h.symbol}</div>
      <div class="hex-info">
        <div class="hex-num-small">第 ${h.num} 卦</div>
        <div class="hex-name-small">${h.name}</div>
        <div class="hex-en-small">${h.nameEn.split(' · ')[0]}</div>
        <span class="hex-nature-small" style="background:${h.natureBg};color:${h.natureColor}">${h.nature}</span>
      </div>`;
    item.onclick=()=>{openHex(h);if(window.innerWidth<900)toggleSidebar();};
    el.appendChild(item);
  });
}

function openHex(h){
  currentHex=h;
  document.querySelectorAll('.hex-item').forEach(el=>{
    const num=parseInt(el.querySelector('.hex-num-small').textContent);
    el.classList.toggle('active',num===h.num);
  });
  document.getElementById('empty-state').style.display='none';
  const detail=document.getElementById('detail-panel');
  detail.classList.remove('show');
  void detail.offsetWidth;

  document.getElementById('d-symbol').textContent=h.symbol;
  document.getElementById('d-num').textContent=`第 ${h.num} 卦 · ${h.upper} 上 ${h.lower} 下`;
  document.getElementById('d-name').textContent=h.name;
  document.getElementById('d-name-en').textContent=h.nameEn;
  document.getElementById('d-badges').innerHTML=
    `<span class="badge badge-nature">${h.nature}</span>
     <span class="badge badge-gua">上卦：${h.upper}</span>
     <span class="badge badge-gua">下卦：${h.lower}</span>`;
  document.getElementById('d-keywords').innerHTML=h.keywords.map(k=>`<span class="kw">${k}</span>`).join('');

  populateTabs(h);
  showTab('gua');
  detail.classList.add('show');
  document.getElementById('main-panel').scrollTop=0;
}

function populateTabs(h){
  document.getElementById('t-gua').textContent=h.gua;
  document.getElementById('t-gua-trans').textContent=h.guaTrans||'';
  document.getElementById('t-gua-comm').innerHTML=renderComm(h.guaComm||[]);
  document.getElementById('t-tuan').textContent=h.tuan||'';
  document.getElementById('t-tuan-trans').textContent=h.tuanTrans||'';
  document.getElementById('t-tuan-comm').innerHTML=renderComm(h.tuanComm||[]);
  document.getElementById('t-xiang').textContent=h.xiang||'';
  document.getElementById('t-xiang-trans').textContent=h.xiangTrans||'';
  document.getElementById('t-xiang-comm').innerHTML=renderComm(h.xiangComm||[]);

  const yaoGrid=document.getElementById('t-yao-grid');
  yaoGrid.innerHTML=(h.yao&&h.yao.length)
    ?h.yao.map((y,i)=>`
      <div class="yao-block">
        <div class="yao-header">
          <div class="yao-idx">0${i+1}</div>
          <div class="yao-meta">
            <div class="yao-pos">${y.pos}</div>
            ${y.badge?`<span class="yao-nature-badge" style="background:${y.badgeBg};color:${y.badgeColor}">${y.badge}</span>`:''}
          </div>
        </div>
        <div class="yao-body">
          <div class="yao-ci">${y.name}：${y.ci}</div>
          <div class="yao-meaning">${y.meaning}</div>
          <div class="yao-commentaries">${renderComm(y.comm||[])}</div>
        </div>
      </div>`).join('')
    :`<div style="padding:2rem;color:var(--text3);font-size:13px;font-family:var(--sans)">此卦爻辭注疏資料整理中，敬請期待。</div>`;

  const szGrid=document.getElementById('t-sz-grid');
  szGrid.innerHTML=(h.sz&&h.sz.length)
    ?h.sz.map(s=>`
      <div class="sz-card">
        <div class="sz-char-row">
          <span class="sz-char">${s.char}</span>
          <span class="sz-pinyin">${s.pinyin}</span>
          <span class="sz-radical">部首：${s.radical}</span>
        </div>
        <div class="sz-original">${s.original}</div>
        <div class="sz-trans">${s.trans}</div>
        <div class="sz-evolution">字形演變：${s.evolution}</div>
      </div>`).join('')
    :`<div style="padding:2rem;color:var(--text3);font-size:13px;font-family:var(--sans)">說文解字資料整理中，敬請期待。</div>`;

  const notesContent=document.getElementById('t-notes-content');
  notesContent.innerHTML=(h.notes&&h.notes.length)
    ?h.notes.map(n=>`
      <div class="section-block">
        <div class="sec-label">${n.title}</div>
        <div style="font-size:14px;color:var(--text2);line-height:1.9;font-family:var(--sans)">${n.content}</div>
      </div>`).join('')
    :`<div style="padding:2rem;color:var(--text3);font-size:13px;font-family:var(--sans)">歷代注疏資料整理中，敬請期待。</div>`;

  const sourcesEl=document.getElementById('t-sources');
  sourcesEl.innerHTML=(h.sources&&h.sources.length)
    ?h.sources.map(s=>`
      <div class="source-card">
        <div class="source-title">${s.title}</div>
        <div class="source-desc">${s.desc}</div>
      </div>`).join('')
    :`<div style="padding:2rem;color:var(--text3);font-size:13px;font-family:var(--sans)">參考文獻整理中。</div>`;
}

function renderComm(comms){
  if(!comms||!comms.length) return '';
  return comms.map(c=>`
    <div class="commentary-block">
      <div class="comm-header">
        <span class="comm-scholar">${c.scholar}</span>
        <span class="comm-era">${c.era}</span>
        <span class="comm-era" style="margin-left:4px">《${c.book.replace(/[《》]/g,'')}》</span>
      </div>
      <div class="comm-text">「${c.text}」</div>
      <div class="comm-trans">${c.trans}</div>
    </div>`).join('');
}

function showTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    const tabs=['gua','yao','sz','notes','sources'];
    b.classList.toggle('active',tabs[i]===tab);
  });
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('show'));
  document.getElementById('tab-'+tab).classList.add('show');
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('mobile-show');
}

init();
</script>
</body>
</html>

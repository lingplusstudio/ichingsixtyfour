<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>解卦靈感庫</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Serif+TC:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* 完美繼承主網站的色彩與字體變數 */
    :root {
      --bg: #F8F5F0;
      --bg2: #EFEBE3;
      --surface: #FFFFFF;
      --surface2: rgba(255,255,255,0.7);
      --border: rgba(0,0,0,0.07);
      --border-md: rgba(0,0,0,0.13);
      --border-strong: rgba(0,0,0,0.22);
      --text: #1A1612;
      --text2: #5A544E;
      --text3: #9A9188;
      --accent: #7A5C2E;
      --accent2: #4A6741;
      --red: #8B2020;
      --radius: 14px;
      --radius-sm: 7px;
      --serif: 'Noto Serif TC', 'Songti TC', 'SimSun', 'PMingLiU', serif;
      --display: 'Noto Serif TC', 'Songti TC', 'SimSun', 'PMingLiU', serif;
      --sans: 'Noto Serif TC', 'Songti TC', 'SimSun', 'PMingLiU', serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      padding: 3rem 1.5rem;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 460px;
    }

    .header {
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border-md);
      padding-bottom: 1rem;
    }

    .title {
      font-family: var(--display);
      font-size: 22px;
      color: var(--text);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--text3);
      margin-top: 6px;
      letter-spacing: .06em;
      font-family: var(--sans);
    }

    .select-wrap {
      margin-bottom: 2rem;
    }

    select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border-md);
      border-radius: 8px;
      font-size: 15px;
      font-family: var(--serif);
      background: var(--surface);
      color: var(--text);
      outline: none;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      transition: all 0.2s ease;
      appearance: none; /* 隱藏原生箭頭以求極簡 */
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%239A9188%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 1rem top 50%;
      background-size: 0.65rem auto;
    }

    select:focus, select:hover {
      border-color: var(--accent);
    }

    .tip-card {
      background: var(--surface);
      border: 1px solid var(--border-md);
      border-radius: var(--radius);
      padding: 1.8rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
      display: none; /* 預設隱藏 */
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .sec-block {
      margin-bottom: 1.5rem;
    }

    .sec-block:last-child {
      margin-bottom: 0;
    }

    .sec-label {
      font-size: 10px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--text3);
      font-weight: 600;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .tip-content {
      font-family: var(--serif);
      font-size: 15px;
      color: var(--text2);
      line-height: 1.8;
    }

    .tip-content.highlight {
      color: var(--text);
      font-weight: 500;
    }
  </style>
</head>

  <script src="hexagramData.js"></script>

  <script>
    const guaSelect = document.getElementById('guaSelect');
    const tipCard = document.getElementById('tipCard');
    
    guaSelect.addEventListener('change', function() {
      const selectedGua = this.value;
      const tips = hexagramTips[selectedGua]; // 從資料庫抓資料

      if (tips) {
        document.getElementById('displayImage').innerText = tips.image;
        document.getElementById('displayStrategy').innerText = tips.strategy;
        document.getElementById('displayPsychology').innerText = tips.psychology;
        tipCard.style.display = 'block'; // 顯示卡片
      } else {
        document.getElementById('displayImage').innerText = "提示建置中...";
        document.getElementById('displayStrategy').innerText = "提示建置中...";
        document.getElementById('displayPsychology').innerText = "提示建置中...";
        tipCard.style.display = 'block';
      }
    });
  </script>
